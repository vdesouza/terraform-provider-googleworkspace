name: Terraform module validation

on:
  push:
    paths:
      - 'modules/**'
      - 'examples/modules/**'
      - '.github/workflows/terraform_validate.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'examples/modules/**'
      - '.github/workflows/terraform_validate.yml'
  schedule:
    # Weekly run catches provider releases that change resource schemas
    - cron: '0 6 * * 1'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        terraform_version:
          - '1.3.10'
          - '1.7.5'
          - 'latest'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform_version }}

      - name: Format check (modules + examples)
        run: terraform fmt -recursive -check ./modules/ ./examples/

      - name: Validate modules
        run: make validate-modules

      - name: Validate examples
        run: make validate-examples
